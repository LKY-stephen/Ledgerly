name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @creator-cfo/web test
      - run: pnpm build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --directory apps/api
      - run: uv run --directory apps/api ruff check .
      - run: uv run --directory apps/api pytest
      - run: uv run --directory apps/api python scripts/export_openapi.py --check
